# 本地开发依赖服务
# 用法：docker compose -f docker-compose.dev.yml up -d
# 停止：docker compose -f docker-compose.dev.yml down
# 清除数据：docker compose -f docker-compose.dev.yml down -v

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: interview-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-interview_guide}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: interview-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # =========================================
  # MinIO (S3兼容) 对象存储服务
  # -----------------------------------------
  # 用于存储简历、文档等非结构化数据
  # 浏览器访问 http://localhost:9003 管理文件
  # =========================================
  minio:
    image: minio/minio
    container_name: interview-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MinIO 初始化任务：自动创建 bucket
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/interview-guide || true;
      /usr/bin/mc anonymous set public myminio/interview-guide || true;
      exit 0;
      "



# 首次启动后，浏览器访问 http://localhost:9003
# 使用 minioadmin / minioadmin 登录

volumes:
  postgres_data:
  redis_data:
  minio_data:
