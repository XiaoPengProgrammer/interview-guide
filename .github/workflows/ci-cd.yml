# ==========================================================================
# CI/CD 流水线 —— 面试助手项目自动构建与部署
# ==========================================================================
# 
# 【这是什么？】
# 每次你把代码推送到 GitHub 上，这台"机器人"会自动跑一遍：
#   1. 编译后端 Java 代码 → 2. 跑后端单元测试 → 3. 构建前端
#   4. 如果配了服务器，还会自动打包 Docker 镜像 + 部署到服务器
#
# 【什么时候触发？】
# - 往 main 分支推送代码时 → CI（构建+测试）+ 有条件地 CD（部署）
# - 提 Pull Request 时      → 只跑 CI（不部署）
#
# 【关于本地开发（localhost）的说明】
# 你现在是在本地 http://localhost:5173 开发，没有部署服务器。
# 所以 CD（部署）那一段默认不会运行，完全不影响 CI 的正常使用。
# 等你以后买了服务器，只需要在 GitHub 仓库 Secrets 里配几个变量，
# CD 就会自动开启，不需要改任何代码。
# ==========================================================================

name: CI/CD Pipeline

# ==================== 触发规则 ====================
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # 手动触发：点一下 GitHub 页面上的 "Run workflow" 按钮就能跑
  workflow_dispatch:

# ==================== 具体干活的内容 ====================
jobs:
  # -------------------------------------------------------
  # 第 1 个任务：CI（自动构建 + 自动测试）
  # -------------------------------------------------------
  # 这个任务不需要服务器，直接在 GitHub 的虚拟机里跑完。
  # 哪怕你只在本地开发，这段也能正常工作。
  # -------------------------------------------------------
  ci:
    name: 🏗️ 构建与测试
    runs-on: ubuntu-latest

    # 测试需要 Redis（即使大部分是 Mockito 单元测试，
    # 但有部分集成测试需要加载 Spring 上下文，而 test 配置里配了 Redis）
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: ☕ 安装 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: 🧪 后端单元测试
        run: ./gradlew :app:test --no-daemon

      - name: 📦 后端打包
        run: ./gradlew :app:bootJar --no-daemon -x test

      - name: 🟢 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 安装前端依赖
        working-directory: ./frontend
        run: |
          npm install -g pnpm
          pnpm install

      - name: 🏗️ 前端打包
        working-directory: ./frontend
        run: pnpm build

  # -------------------------------------------------------
  # ⏸️ CD（自动打包 + 部署到服务器）—— 当前已关闭
  # -------------------------------------------------------
  # 你现在是本地开发，没有部署服务器，所以 CD 暂时不用跑。
  # 以后买了服务器后，把下面 cd: 到最后一个步骤的缩进取消注释，
  # 并在 GitHub Secrets 里配好 DOCKER_USERNAME / DOCKER_PASSWORD
  # / DEPLOY_HOST / DEPLOY_USER / DEPLOY_KEY 即可开启自动部署。
